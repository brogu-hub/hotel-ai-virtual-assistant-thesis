# =============================================================================
# Hotel AI Operations Assistant - Local Development with Ollama
# Self-contained stack: Ollama (LLM + Embeddings), PostgreSQL, Redis, Qdrant, API
# =============================================================================

services:
  # ===========================================================================
  # Ollama - Local LLM and Embedding Server
  # ===========================================================================
  hotel-ollama:
    container_name: hotel-ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - hotel-ollama-data:/root/.ollama
    ports:
      - "11435:11434"
    environment:
      # Concurrent request slots inside Ollama. Default is 1 — every
      # parallel request serializes inside Ollama itself. Sizing tuned
      # for RTX 5080 (16GB) + qwen3.5-opus:9b Q5_K_M (~6.5GB weights):
      # 2 slots gives the best latency/concurrency trade-off (single
      # GPU throughput divides across active slots). Cloud OpenRouter
      # is available as failover for bursty traffic beyond 2 concurrent.
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      # Max models loaded simultaneously. Keep at 1 for the hotel demo
      # (single 9B model) unless you want multi-model A/B testing.
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      # How long an idle model stays loaded. Longer = fewer cold starts,
      # more VRAM held. 15m is a good default for active hotel traffic.
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-15m}
      # Flash attention speeds up attention compute with no quality impact.
      # NOTE: OLLAMA_KV_CACHE_TYPE=q8_0 was tested but caused CPU offload
      # on RTX 5080 with this 9B model — disabled for now.
      OLLAMA_FLASH_ATTENTION: ${OLLAMA_FLASH_ATTENTION:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s
    networks:
      - hotel-ai-network

  # ===========================================================================
  # PostgreSQL - Hotel Database
  # ===========================================================================
  hotel-db:
    container_name: hotel-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hotelpass123
    volumes:
      - hotel-db-data:/var/lib/postgresql/data
      - ./init-scripts/init-hotel.sql:/docker-entrypoint-initdb.d/01-init-hotel.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotel"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - hotel-ai-network

  # ===========================================================================
  # Redis - Session Cache
  # ===========================================================================
  hotel-redis:
    container_name: hotel-redis
    image: redis:7.0.13-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - hotel-redis-data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hotel-ai-network

  # ===========================================================================
  # Qdrant - Vector Database for Hotel Knowledge RAG
  # ===========================================================================
  hotel-qdrant:
    container_name: hotel-qdrant
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - hotel-qdrant-data:/qdrant/storage
    ports:
      - "6334:6333"
      - "6335:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - hotel-ai-network

  # ===========================================================================
  # Hotel API Server (FastAPI + LangGraph Agent)
  # ===========================================================================
  hotel-api:
    container_name: hotel-api
    restart: unless-stopped
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.dev
    volumes:
      - ../../src:/app/src:cached
      - ../../scripts:/app/scripts:cached
      - ../../data:/app/data:cached
    environment:
      PYTHONPATH: /app
      APP_ENV: development

      # --- LLM: Local Ollama (default, switchable at runtime via PUT /settings/llm) ---
      LLM_BACKEND: ollama
      OLLAMA_BASE_URL: http://hotel-ollama:11434/v1
      OLLAMA_MODEL: fredrezones55/qwen3.5-opus:9b

      # --- OpenRouter (available for runtime switching) ---
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-sk-dummy-not-used}
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3-max}
      OPENROUTER_RATE_LIMIT: ${OPENROUTER_RATE_LIMIT:-20}

      # --- Embeddings: OpenRouter qwen3-embedding-8b ---
      EMBEDDING_BACKEND: openrouter
      EMBEDDING_MODEL: qwen/qwen3-embedding-8b
      EMBEDDING_VECTOR_SIZE: "4096"

      # --- Vector Store: Local Qdrant ---
      QDRANT_URL: http://hotel-qdrant:6333
      APP_VECTORSTORE_NAME: qdrant

      # --- Database: Local PostgreSQL ---
      # DATABASE_URL is read from .env so the app can connect as a
      # least-privilege role (hotel_app) while the postgres container itself
      # still boots as the postgres superuser. See deploy/compose/init-scripts/init-hotel.sql
      # for the hotel_app role definition (no DELETE on reservations/audit_log/payment_links).
      DATABASE_URL: ${DATABASE_URL:-postgresql://hotel_app:hotel_app_pass_CHANGE_ME@hotel-db:5432/hotel}
      POSTGRES_HOST: hotel-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: hotel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hotelpass123
      CUSTOMER_DATA_DB: hotel

      # --- Cache: Local Redis ---
      REDIS_HOST: hotel-redis
      REDIS_PORT: "6379"
      APP_CACHE_URL: hotel-redis:6379
      REDIS_SESSION_EXPIRY: "12"

      # --- LangGraph ---
      LANGGRAPH_MODE: embedded
      APP_CHECKPOINTER_NAME: postgres
      GRAPH_RECURSION_LIMIT: "20"
      GRAPH_TIMEOUT_IN_SEC: "60"

      # --- Reranker: Local Qwen (no NVIDIA API needed) ---
      # Reranker disabled — embedding search is already accurate for our
      # hotel knowledge base, and the CrossEncoder reranker was adding
      # ~1-2s of CPU-bound work per query AND blocking the FastAPI event
      # loop (stalling all other requests). Set to "qwen" or "nvidia" to
      # re-enable if you add less accurate embedding models later.
      RERANKER_BACKEND: ${RERANKER_BACKEND:-none}

      # --- Authentication (JWT + bcrypt) ---
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-in-prod-8f3a9e2b1c7d4f6e5a8b9c0d1e2f3a4b}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      LOGIN_RATE_LIMIT_PER_IP: ${LOGIN_RATE_LIMIT_PER_IP:-100}
      LOGIN_RATE_LIMIT_PER_USER: ${LOGIN_RATE_LIMIT_PER_USER:-5}
      LOCKOUT_THRESHOLD: ${LOCKOUT_THRESHOLD:-5}
      LOCKOUT_MINUTES: ${LOCKOUT_MINUTES:-15}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@grandhorizon.hotel}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}

      # --- Scaling: DB pool + user cache ---
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      USER_CACHE_TTL_SECONDS: ${USER_CACHE_TTL_SECONDS:-30}

      # --- Scaling: Chat concurrency (many simultaneous users) ---
      MAX_CONCURRENT_LLM_CALLS: ${MAX_CONCURRENT_LLM_CALLS:-5}
      LLM_QUEUE_TIMEOUT_SEC: ${LLM_QUEUE_TIMEOUT_SEC:-30}
      MAX_CONCURRENT_STREAMS: ${MAX_CONCURRENT_STREAMS:-20}
      CHAT_RATE_LIMIT_PER_SESSION: ${CHAT_RATE_LIMIT_PER_SESSION:-30}
      KNOWLEDGE_CACHE_SIZE: ${KNOWLEDGE_CACHE_SIZE:-500}
      KNOWLEDGE_CACHE_TTL_SEC: ${KNOWLEDGE_CACHE_TTL_SEC:-300}

      # --- Logging ---
      LOGLEVEL: DEBUG
      LOG_LEVEL: DEBUG

    ports:
      - "8088:8088"
    depends_on:
      hotel-ollama:
        condition: service_healthy
      hotel-db:
        condition: service_healthy
      hotel-redis:
        condition: service_healthy
      hotel-qdrant:
        condition: service_healthy
    networks:
      - hotel-ai-network
    command: >
      python -m uvicorn src.hotel_guardrails.server:app
      --host 0.0.0.0 --port 8088 --reload
    develop:
      watch:
        # Rebuild container when dependencies change
        - action: rebuild
          path: ../../requirements.dev.txt
        - action: rebuild
          path: ../../docker/dev/Dockerfile.dev
        # Sync source code (hot reload via uvicorn --reload)
        - action: sync
          path: ../../src
          target: /app/src
        - action: sync
          path: ../../scripts
          target: /app/scripts
        - action: sync
          path: ../../data
          target: /app/data

networks:
  hotel-ai-network:
    name: hotel-ai-network
    driver: bridge

volumes:
  hotel-ollama-data:
  hotel-db-data:
  hotel-redis-data:
  hotel-qdrant-data:
